<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DhanTrack – Legal</title>
  <meta name="description" content="DhanTrack legal pages — Privacy Policy, Terms & Conditions, and Account Deletion." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:   #00C896;
      --green-d: #00A87E;
      --red:     #FF4757;
      --red-d:   #e03040;
      --bg:      #0A0E1A;
      --bg2:     #111827;
      --bg3:     #1C2537;
      --border:  #1F2D45;
      --text:    #E8EDF5;
      --muted:   #8A9BBE;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background:
        radial-gradient(ellipse 80% 50% at 50% -10%, rgba(0,200,150,.13), transparent),
        var(--bg);
    }

    .card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px 40px 32px;
      text-align: center;
      max-width: 380px;
      width: 90%;
      box-shadow: 0 24px 64px rgba(0,0,0,.4);
    }

    .logo-icon {
      width: 56px; height: 56px; border-radius: 16px;
      background: linear-gradient(135deg, var(--green), #00E5B0);
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 26px; font-weight: 800; color: #fff;
      margin-bottom: 16px;
    }

    h1 {
      font-size: 1.5rem; font-weight: 800;
      color: var(--text); letter-spacing: -.02em;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: .85rem; color: var(--muted);
      margin-bottom: 32px;
    }

    .divider {
      height: 1px; background: var(--border);
      margin: 0 0 24px;
    }

    a {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      text-decoration: none;
      padding: 13px 20px;
      border-radius: 10px;
      margin-bottom: 12px;
      font-size: .9rem; font-weight: 600;
      transition: all .2s;
    }

    a.primary {
      background: var(--green); color: #000;
    }
    a.primary:hover { background: var(--green-d); transform: translateY(-2px); box-shadow: 0 10px 28px rgba(0,200,150,.25); }

    a.secondary {
      background: var(--bg3); color: var(--text);
      border: 1px solid var(--border);
    }
    a.secondary:hover { border-color: var(--green); color: var(--green); transform: translateY(-2px); }

    a.danger {
      background: transparent; color: var(--red);
      border: 1px solid rgba(255,71,87,.3);
      margin-bottom: 0;
    }
    a.danger:hover { background: rgba(255,71,87,.08); border-color: var(--red); transform: translateY(-2px); }

    footer {
      margin-top: 28px;
      font-size: .75rem;
      color: var(--muted);
    }
    footer a { display: inline; color: var(--green); text-decoration: none; margin: 0; padding: 0; background: none; font-size: .75rem; font-weight: 500; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-icon">D</div>
    <h1>DhanTrack</h1>
    <p class="subtitle">Budget &amp; Money Manager</p>
    <div class="divider"></div>
    <a href="dhantrack.html" class="primary">🚀 Product Overview</a>
    <a href="privacy_policy.html" class="secondary">🔒 Privacy Policy</a>
    <a href="terms_and_conditions.html" class="secondary">📄 Terms &amp; Conditions</a>
    <a href="delete_account.html" class="danger">🗑️ Delete Account &amp; Data</a>
  </div>
  <footer>
    © 2026 DhanTrack &nbsp;·&nbsp;
    <a href="mailto:support@dhantrack.app">support@dhantrack.app</a>
  </footer>
</body>
</html>
